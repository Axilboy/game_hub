services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - PORT=3000
      - NODE_ENV=production

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - web
